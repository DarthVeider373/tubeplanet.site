<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Desatadora de Nós</title>

  <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>

  <script>
    window.googlePixelId = "6a08f04f5b5c4ce4887ab26b";

    const pixelScript = document.createElement("script");

    pixelScript.async = true;
    pixelScript.defer = true;
    pixelScript.src = "https://cdn.utmify.com.br/scripts/pixel/pixel-google.js";

    document.head.appendChild(pixelScript);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #eeb70a;
      --gold: #d8a10b;
      --gold-light: #f5cf5f;
      --brown-dark: #4e3200;
      --brown-medium: #7b5300;
      --text-dark: #1c1208;
      --white-soft: #fffdf6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-main);
      padding: 22px 16px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
    }

    .main-card {
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .42);
    }

    .hero-area {
      padding: 14px 14px 0;
      background: #fff;
    }

    .hero-image {
      width: 64%;
      max-width: 230px;
      display: block;
      margin: 0 auto;
      border-radius: 14px;
    }

    .top-strip {
      background: linear-gradient(90deg,
          var(--brown-dark),
          var(--brown-medium),
          var(--brown-dark));
      color: #f8df9a;
      text-align: center;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;

      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .content-box {
      background: var(--white-soft);
      padding: 24px 22px 28px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 6vw, 31px);
      line-height: 1.15;
      text-align: center;
      color: var(--text-dark);
      font-weight: 900;
    }

    .headline span {
      color: var(--brown-medium);
      font-style: italic;
    }

    .subheadline {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 12px;
      font-weight: 700;
      color: var(--brown-medium);
      text-align: center;
    }

    .cta-button {
      width: 100%;
      border: none;
      outline: none;
      text-decoration: none;

      background: linear-gradient(135deg,
          #e7aa00,
          #f7c918,
          #cb8f00);

      color: var(--text-dark);

      border-radius: 999px;

      padding: 17px 20px;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      font-size: 18px;
      font-weight: 800;

      cursor: pointer;

      box-shadow: 0 5px 18px rgba(180, 120, 0, .5);

      animation: pulseGlow 2.5s infinite ease-in-out;

      transition:
        transform .15s ease,
        box-shadow .15s ease;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(180, 120, 0, .7);
    }

    .cta-button:active {
      transform: scale(.99);
    }

    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 5px 18px rgba(180, 120, 0, .45);
      }

      50% {
        box-shadow: 0 5px 30px rgba(180, 120, 0, .85);
      }
    }

    .instant-access {
      display: flex;
      align-items: center;
      gap: 7px;

      color: #777;
      font-size: 13px;
    }

    footer {
      margin-top: 24px;

      text-align: center;

      font-size: 11px;
      line-height: 2;

      color: rgba(255, 255, 255, .75);
    }

    footer a {
      color: rgba(255, 255, 255, .95);
      text-decoration: underline;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .74);

      display: none;
      justify-content: center;
      align-items: center;

      padding: 18px;

      z-index: 9999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 720px;
      max-height: 88vh;

      overflow-y: auto;

      background: var(--white-soft);

      border-radius: 24px;

      border: 2px solid #f5c518;

      box-shadow: 0 20px 70px rgba(0, 0, 0, .5);

      animation: modalIn .25s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(15px) scale(.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      background: linear-gradient(90deg,
          var(--brown-dark),
          var(--brown-medium),
          var(--brown-dark));

      color: #f8df9a;

      padding: 18px 22px;

      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .modal-header h2 {
      font-size: 24px;
      line-height: 1.2;
      font-family: 'Playfair Display', serif;
    }

    .close-modal {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;

      background: rgba(255, 255, 255, .15);

      color: white;

      font-size: 24px;

      cursor: pointer;
    }

    .modal-body {
      padding: 24px;
      color: #2b1b08;
      line-height: 1.8;
      font-size: 14px;
    }

    .modal-body h3 {
      margin: 18px 0 8px;
      color: var(--brown-medium);
      font-size: 17px;
    }

    .modal-body p {
      margin-bottom: 12px;
    }

    @media(max-width:480px) {

      body {
        padding: 12px 10px 28px;
      }

      .main-card {
        border-radius: 20px;
      }

      .hero-image {
        width: 52%;
        max-width: 165px;
      }

      .top-strip {
        font-size: 11px;
        padding: 8px 14px;
      }

      .content-box {
        padding: 18px 18px 24px;
      }

      .headline {
        font-size: 22px;
      }

      .subheadline {
        font-size: 10px;
      }

      .cta-button {
        font-size: 16px;
        padding: 15px 18px;
      }

      .modal-header h2 {
        font-size: 21px;
      }

      .modal-body {
        padding: 20px;
        font-size: 13.5px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">

    <main class="main-card">

      <div class="hero-area">

        <img class="hero-image" src="./images/nossa-senhora-desatadora.jpg" alt="Desatadora de Nós" onerror="this.style.display='none'">

      </div>

      <div class="top-strip">
        ✨ DESATADORA DE NÓS ✨
      </div>

      <section class="content-box">

        <h1 class="headline">
          Escute essa <span>oração<br>de 7 palavras</span>
        </h1>

        <p class="subheadline">
          Clique abaixo e Ouça agora
        </p>

        <a href="../vsl-2/" class="cta-button" id="mainCTA">

          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">

            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />

            <path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z" />

          </svg>

          Ouvir Agora

        </a>

        <div class="instant-access">

          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#8b6000" viewBox="0 0 16 16">

            <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" />

          </svg>

          Acesso imediato e gratuito

        </div>

      </section>

    </main>

    <footer>

      © 2026 Desatadora de Nós. Todos os direitos reservados.
      <br>

      <a onclick="openModal('terms')">Termos de Uso</a>
      ·
      <a onclick="openModal('privacy')">Política de Privacidade</a>

    </footer>

  </div>

  <div class="modal-overlay" id="modalOverlay">

    <div class="modal">

      <div class="modal-header">

        <h2 id="modalTitle">Termos de Uso</h2>

        <button class="close-modal" onclick="closeModal()">×</button>

      </div>

      <div class="modal-body" id="modalContent"></div>

    </div>

  </div>

  <script>

    (() => {

      const query = window.location.search;

      if (!query) return;

      const cta = document.getElementById("mainCTA");

      const currentHref = cta.getAttribute("href");

      const separator = currentHref.includes("?") ? "&" : "?";

      cta.href = currentHref + separator + query.replace("?", "");

    })();

    const modalData = {

      terms: {

        title: "Termos de Uso",

        content: `
          <p>Ao acessar esta página, você concorda com os presentes Termos de Uso.</p>

          <h3>1. Finalidade do Conteúdo</h3>

          <p>O conteúdo apresentado possui finalidade informativa, espiritual e devocional.</p>

          <h3>2. Uso da Página</h3>

          <p>Você se compromete a utilizar esta página de forma adequada.</p>

          <h3>3. Responsabilidade</h3>

          <p>Esta página não substitui orientação profissional.</p>
        `
      },

      privacy: {

        title: "Política de Privacidade",

        content: `
          <p>A sua privacidade é importante para nós.</p>

          <h3>1. Coleta de Informações</h3>

          <p>Podemos coletar dados básicos de navegação para melhorar a experiência.</p>

          <h3>2. Cookies</h3>

          <p>Cookies podem ser utilizados para análise de desempenho e campanhas.</p>

          <h3>3. Segurança</h3>

          <p>Adotamos medidas razoáveis para proteger as informações.</p>
        `
      }
    };

    const overlay = document.getElementById("modalOverlay");

    const title = document.getElementById("modalTitle");

    const content = document.getElementById("modalContent");

    function openModal(type) {

      title.innerHTML = modalData[type].title;

      content.innerHTML = modalData[type].content;

      overlay.classList.add("show");

      document.body.style.overflow = "hidden";
    }

    function closeModal() {

      overlay.classList.remove("show");

      document.body.style.overflow = "";
    }

    overlay.addEventListener("click", (event) => {

      if (event.target === overlay) {

        closeModal();

      }

    });

    document.addEventListener("keydown", (event) => {

      if (event.key === "Escape") {

        closeModal();

      }

    });

  </script>

</body>

</html>
